# Cloud production configuration that matches the manuscript exactly.
#
# Backend: Together AI hosting Meta Llama 3.1 70B Instruct.
# Decoding: temperature 0, top_p 1.0, max_tokens 512.
# Embeddings: intfloat/e5-large-v2.
# Seed: 42.
#
# Required environment variable:
#   TOGETHER_API_KEY=<your key from https://api.together.ai/settings/api-keys>

project_name: "llm-memory-eval"

backend:
  name: "together"
  model: "meta-llama/Meta-Llama-3.1-70B-Instruct"
  # Together AI also offers a "Turbo" variant with slightly different
  # numerics: "meta-llama/Llama-3.1-70B-Instruct-Turbo". The non-Turbo
  # variant above matches the manuscript's reference deployment.
  base_url: null
  num_ctx: 8192
  keep_alive: "30m"
  request_timeout_seconds: 600
  max_retries: 5

decoding:
  temperature: 0.0
  top_p: 1.0
  max_tokens: 512
  seed: 42

memory:
  context_budget_tokens: 3000
  summarization:
    max_chunks: 2
    chunk_tokens: 1800
    per_chunk_output_tokens: 300
    summary_budget_tokens: 1000
  rag:
    embedding_model: "intfloat/e5-large-v2"
    chunk_size_words: 220
    chunk_overlap_words: 40
    top_k: 8
    embedding_device: "auto"

metrics:
  consistency_f1_threshold: 0.30
  contradiction_f1_threshold: 0.30

analysis:
  alpha: 0.05
  multiple_comparison_correction: "holm"

paths:
  data_raw: "data/raw"
  data_processed: "data/processed"
  results: "results"
  figures: "results/figures"
  tables: "results/tables"
  dissertation: "dissertation"

log_level: "INFO"
